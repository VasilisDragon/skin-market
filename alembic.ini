[alembic]
script_location = db/migrations
prepend_sys_path = .
path_separator = os
# DATABASE_URL is read by env.py via db.connection.get_engine();
# do not set sqlalchemy.url here.

# Don't suffix migration filenames with a hash — keeps them ordered and
# greppable.
file_template = %%(rev)s_%%(slug)s

# Standard logging config — alembic only, the application logging happens
# elsewhere.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
