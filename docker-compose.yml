# Footgun: POSTGRES_PASSWORD is only consumed by the postgres image on the
# FIRST initialization of the data volume. If you rotate the password later,
# either ALTER USER inside the running container, or destroy + recreate the
# volume with `docker compose down -v` (DESTRUCTIVE — wipes all data).
# A stale-password container will fail healthchecks and refuse connections
# until you do one or the other. See docs/operations.md §"Postgres password
# rotation footgun" for the full recovery recipe.
#
# Phase 8b polish: every service has consistent restart + log rotation
# settings. Log driver caps stdout to 50MB × 5 files per service so a
# long-running collector doesn't fill disk over weeks of operation.

# Shared log-rotation config — every service inherits via YAML anchor so a
# future tweak is a one-place change. 50MB × 5 = 250MB max per service.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: 50m
    max-file: "5"

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: skinmarket-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Bind to localhost only — never expose Postgres on all interfaces.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skinmarket-collector
    environment:
      # The container talks to postgres over the compose network, so the
      # host is the service name "postgres", not "localhost" like the
      # host-side .env. POSTGRES_* values come from the .env at the
      # repo root via compose's variable interpolation.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Phase 2a — the Pricempire bulk-snapshot collector needs the
      # Developer-tier bearer token. Read at the start of each cycle;
      # collectors.pricempire.collect_snapshot fails fast (logs ERROR,
      # returns without HTTP call) when this is empty.
      PRICEMPIRE_API_KEY: ${PRICEMPIRE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    # Steam's per-cycle runtime is ~4 minutes (50 items at 5s spacing).
    # Allow it to drain on SIGTERM before docker SIGKILLs the process.
    stop_grace_period: 5m

  api:
    # Same image as collector / analytics — only the entrypoint differs.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skinmarket-api
    command:
      [
        "uvicorn", "api.main:app",
        "--host", "0.0.0.0", "--port", "8000",
        "--proxy-headers"
      ]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Single static bearer for the read API. Set in .env (Phase 6.6,
      # ADR 014 §10). Required at startup — auth fails closed if unset.
      SKIN_MARKET_API_TOKEN: ${SKIN_MARKET_API_TOKEN}
      # Phase 7b multi-token (ADR 014 §10): comma-separated list of
      # accepted tokens, unioned with the singular alias above.
      # Operator typically leaves this empty in single-consumer
      # deployments; populate during a graceful rotation cutover.
      SKIN_MARKET_API_TOKENS: ${SKIN_MARKET_API_TOKENS:-}
      # Phase A exact-asset baseline: the API performs the deterministic
      # public-inventory lookup through Pricempire, then combines the
      # exact asset attributes with local market-name rows.
      PRICEMPIRE_API_KEY: ${PRICEMPIRE_API_KEY:-}
      PRICE_ALERT_MAX_ACTIVE_PER_USER: ${PRICE_ALERT_MAX_ACTIVE_PER_USER:-25}
      PRICE_ALERT_MAX_DELIVERY_ATTEMPTS: ${PRICE_ALERT_MAX_DELIVERY_ATTEMPTS:-5}
      PORTFOLIO_SNAPSHOT_MAX_DAILY_PER_USER: ${PORTFOLIO_SNAPSHOT_MAX_DAILY_PER_USER:-10}
    # Host-local port mapping (NEVER 0.0.0.0) so Hermes — which runs
    # as a host process at ~/.hermes-discord/, not as a compose
    # service — can reach the api with the bearer token. Host port
    # 8001 chosen because 8000 is held by another container on this
    # host (open-terminal). The container's internal port stays 8000;
    # only the host-facing mapping shifts. ADR 014 §3 anticipated the
    # host-mapping requirement; §10 documents the deployment.
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging

  bot:
    # Same image as collector / analytics / api — only the
    # entrypoint differs. Phase 7c (ADR 016, superseded by the
    # DeepSeek hard cutover): Discord bot routes tool-calling
    # through DeepSeek and logs LLM usage to Postgres.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skinmarket-bot
    command: ["python", "-m", "bot.main"]
    environment:
      # Bot reads the api over the compose internal network (the
      # Phase 6.6 host port mapping is irrelevant in-compose). The
      # token must be in the api's accepted set (Phase 7b §10).
      SKIN_MARKET_API_BASE_URL: http://api:8000
      SKIN_MARKET_API_TOKEN: ${SKIN_MARKET_API_TOKEN}
      # Usage accounting writes one llm_usage_log row per DeepSeek
      # request. Market reads still go through the API.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      LLM_USAGE_LOG_FULL_PROMPT: ${LLM_USAGE_LOG_FULL_PROMPT:-false}
      DEEPSEEK_DAILY_COST_LIMIT_USD: ${DEEPSEEK_DAILY_COST_LIMIT_USD:-0}
      DEEPSEEK_DAILY_USER_COST_LIMIT_USD: ${DEEPSEEK_DAILY_USER_COST_LIMIT_USD:-0}
      # Discord credentials + access control.
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_ALLOWED_USER_IDS: ${DISCORD_ALLOWED_USER_IDS:-}
      PRICE_ALERT_POLL_SECONDS: ${PRICE_ALERT_POLL_SECONDS:-60}
      PRICE_ALERT_BATCH_LIMIT: ${PRICE_ALERT_BATCH_LIMIT:-100}
      PRICE_ALERT_MAX_ACTIVE_PER_USER: ${PRICE_ALERT_MAX_ACTIVE_PER_USER:-25}
      PRICE_ALERT_MAX_DELIVERY_ATTEMPTS: ${PRICE_ALERT_MAX_DELIVERY_ATTEMPTS:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    # No ``ports:`` mapping — the bot makes outbound connections
    # only (Discord + DeepSeek + api + postgres). Nothing reaches in.
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  analytics:
    # Same image as collector — only the entrypoint differs.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skinmarket-analytics
    command: ["python", "-m", "analytics.scheduler"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Phase 2b Step 5 feature flag (ADR 022). Defaults to "" (falsy)
      # so a stale .env doesn't accidentally turn the drift detector
      # on before the Step 7 re-seed gate. Set to "true" in .env to
      # enable; analytics/scheduler.py's run_drift_cycle no-ops when
      # this is empty or any non-truthy value.
      DRIFT_DETECTION_ENABLED: ${DRIFT_DETECTION_ENABLED:-}
      # Narrative job uses the same DeepSeek model as the bot by
      # default and logs one llm_usage_log row per request.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      LLM_USAGE_LOG_FULL_PROMPT: ${LLM_USAGE_LOG_FULL_PROMPT:-false}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    # Daily narrative LLM call is outbound to DeepSeek and may still
    # run long on large recap payloads.
    stop_grace_period: 5m

volumes:
  postgres_data:
