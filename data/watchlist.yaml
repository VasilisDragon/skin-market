# skin-market v1 watchlist
#
# This file is the single source of truth for the items the collectors poll.
# scripts/seed_watchlist.py reads it and writes to the `items` and `sources`
# tables.
#
# Mix targets (CS2-liquidity-weighted, not equal):
#   ~25% rifles, ~20% snipers, ~25% knives, ~15% gloves, ~10% pistols, ~5% other
#
# Taxonomy decision: AWPs/SSGs are item_type = "sniper" (not their own type
# and not lumped into "rifle"). Specific AWP filters use weapon_name = "AWP".
# Knives and gloves are always "★"-prefixed in market_hash_name (U+2605).
# StatTrak™ items use the real U+2122 character.
#
# Schema version 1. If field names/structure change incompatibly, bump
# `schema_version` and update the loader.

schema_version: 1

sources:
  - name: steam_market
    base_url: https://steamcommunity.com/market/
    rate_limit_per_minute: 12
    enabled: true
  - name: skinport
    base_url: https://api.skinport.com/v1/
    rate_limit_per_minute: 60
    enabled: true

# 50 items total. Re-ordered by item_type so the mix is visually obvious.
items:
