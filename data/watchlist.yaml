# (Desert Eagle Blaze FN, ★ Butterfly Knife Fade FN), so the unique
# proposal count is 39. Plus 3 Dopplers re-introduced as phase_based
# per ADR 021's classifier = 42 total. The proposal-to-implementation
# reconciliation lives in ADR 024.
#
# 28 items from the prior 48-item watchlist were dropped; 22 new items
# were added. Dropped items' rows in prices / pricempire_observations /
# observation_log / pricempire_observation_log / pricempire_item_metadata
# / insights are PRESERVED in the DB (no orphan-cleanup migration). If
# a dropped item is re-introduced later, the existing items row is
# reused via seed_watchlist.py's ON CONFLICT DO NOTHING upsert.
# ADR 024's orphan-row strategy section documents this.
#
# Broad tier (~500 items) is deferred — see broad_tier_exclusions:
# block above for the rationale.
