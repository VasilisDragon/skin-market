# skin-market watchlist
#
# This file is the single source of truth for the items the collectors poll
# and for tier membership. scripts/seed_watchlist.py reads it and writes to
# the `items` and `sources` tables.
#
# Mix targets (CS2-liquidity-weighted, not equal):
#   ~25% rifles, ~20% snipers, ~25% knives, ~15% gloves, ~10% pistols, ~5% other
#
# Taxonomy decision: AWPs/SSGs are item_type = "sniper" (not their own type
# and not lumped into "rifle"). Specific AWP filters use weapon_name = "AWP".
# Knives and gloves are always "★"-prefixed in market_hash_name (U+2605).
# StatTrak™ items use the real U+2122 character.
#
# Three-tier architecture (Phase 2c, ADR 024 — renamed from
# deep/broad/orphan):
#   tier: curated  — Polled by all four collectors (Steam, Skinport,
#                    DMarket, Pricempire). Drift detection runs,
#                    cross-source spread/divergence analytics fire,
#                    pattern-sensitivity classification applies.
#                    ~42 items, operator-hand-picked, rate-limit-bounded.
#   tier: featured — Polled by Skinport and Pricempire only. Appears in
#                    the bot's watchlist command. No drift detection.
#                    Rate-limit math: Steam at 5s/item × 500 items =
#                    41 min (no margin in 60-min cycle); DMarket at
#                    3s/item × 500 items = 25 min (exceeds 15-min
#                    cycle). Bulk-fetch sources (Skinport, Pricempire)
#                    are free to expand.
#   (substrate)    — Items in the items table but not in this YAML.
#                    Pricempire-only observation via the bulk snapshot.
#                    Does NOT appear in the bot's curated/featured
#                    listing but is queryable via direct lookup.
#                    Computed at read time, not stored as a tier value
#                    here. ~4,450 items today (top-5000 minus curated
#                    minus featured).
#
# Per-file schema_version: data/watchlist.yaml and data/pattern_sensitivity.yaml
# each carry their own schema_version field; the versions are independent and
# bumped on their own file-level schema changes. NOT lockstep. See ADR 021.
#
# Schema version 2 (Phase 2b): added `tier:` field, required on every item.
# Schema version 3 (Phase 2c): tier vocabulary renamed deep→curated,
# broad→featured; orphan→substrate (still computed at read time).

schema_version: 3

# Featured-tier exclusion list (Phase 2b Step 7.1 / Phase 2c rename,
# ADR 024). Items listed here are NEVER added to the featured tier by
# scripts/seed_featured_tier.py, even when they would otherwise rank
# in the top-N by Pricempire rank.
#
# Add an item here when:
#   - Pricempire ranks it high but it's a non-skin (sticker, music kit,
#     patch) the v1 system doesn't poll meaningfully.
#   - It's known-problematic (e.g. inconsistent Pricempire wire format
#     that causes parser issues).
#   - You explicitly don't want it surfaced in the featured listing
#     for any other reason.
#
# What does NOT go here:
#   - Curated-tier composition lives in the items: block below.
#   - Items dropped from curated tier do NOT need to be excluded —
#     they're simply removed from items: when they get curated out.
#     They MAY, however, get re-promoted to featured tier by the
#     seeder if they rank in the top-N by popularity. Add them to
#     featured_tier_exclusions ONLY if you want to veto that
#     re-promotion.
#
# Hand-maintained. seed_featured_tier.py reads this list and NEVER
# writes to it.
#
# Slug-v1 collision pair (ADR 005's anticipated "future collision"
# surfaced at the Phase 2c bootstrap). Both names slugify to
# 'desert-eagle-sunset-storm-factory-new'; the items.slug UNIQUE
# constraint rejects the second insert. Excluded from featured until
# slug v2 ships with a disambiguation rule for non-ASCII chars.
featured_tier_exclusions:
  - "Desert Eagle | Sunset Storm 壱 (Factory New)"
  - "Desert Eagle | Sunset Storm 弐 (Factory New)"

sources:
  - name: steam_market
    base_url: https://steamcommunity.com/market/
    rate_limit_per_minute: 12
    enabled: true
    # Steam Wallet credit, not USD. Carries a ~30-50% structural premium
    # over USD for normal items because wallet credit can't be withdrawn
    # to real money. See docs/sources-and-semantics.md.
    denomination: wallet_credit
  - name: skinport
    base_url: https://api.skinport.com/v1/
    rate_limit_per_minute: 60
    enabled: true
    denomination: usd
  # Second real-money source: a Skinport-vs-DMarket divergence is
  # unambiguous price signal (no wallet-credit denomination artifact).
  # Per-item endpoint (like Steam), unauthenticated read access, US-leaning.
  - name: dmarket
    base_url: https://api.dmarket.com/exchange/v1/
    rate_limit_per_minute: 20
    enabled: true
    denomination: usd

